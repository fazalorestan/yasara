services:
  postgres:
    image: postgres:16-alpine
    container_name: yasara_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: yasara
      POSTGRES_PASSWORD: yasara
      POSTGRES_DB: yasara
    ports:
      - "5432:5432"
    volumes:
      - yasara_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yasara -d yasara"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: yasara_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  yasara_postgres_data:
